<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Frame -->
  <circle cx="16" cy="16" r="14.4" fill="#faf6ee" stroke="#1d3350" stroke-width="1"/>

  <!-- Armillary sphere: three intersecting rings (ellipses) -->
  <g stroke="#1d3350" stroke-width="1.1" fill="none" stroke-linecap="round">
    <ellipse cx="16" cy="16" rx="8" ry="2.6"/>
    <ellipse cx="16" cy="16" rx="8" ry="2.6" transform="rotate(60 16 16)"/>
    <ellipse cx="16" cy="16" rx="8" ry="2.6" transform="rotate(-60 16 16)"/>
  </g>

  <!-- Central core — warm vermilion dot -->
  <circle cx="16" cy="16" r="1.7" fill="#b85a48"/>

  <!-- Subtle stand base -->
  <line x1="16" y1="17.7" x2="16" y2="25" stroke="#1d3350" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
</svg>
