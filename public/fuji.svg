<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0eb"/>
      <stop offset="55%" stop-color="#ece2d0"/>
      <stop offset="100%" stop-color="#d7c7ad"/>
    </linearGradient>
    <linearGradient id="fuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b85a48"/>
      <stop offset="100%" stop-color="#8a3d2f"/>
    </linearGradient>
    <linearGradient id="fujiShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d2a22" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#6d2a22" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b4a6f"/>
      <stop offset="100%" stop-color="#18294a"/>
    </linearGradient>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(-24)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#2d2926" stroke-width="0.6" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="420" fill="url(#sky)"/>
  <rect width="1600" height="420" fill="url(#hatch)"/>

  <!-- Sun -->
  <circle cx="1220" cy="120" r="62" fill="#e9c07a" opacity="0.9"/>
  <circle cx="1220" cy="120" r="62" fill="#c4785a" opacity="0.22"/>

  <!-- Distant cloud strokes spread across -->
  <g stroke="#8a8378" stroke-width="1.1" stroke-linecap="round" opacity="0.55" fill="none">
    <path d="M60 80 Q140 72 240 80 T440 82 T640 80"/>
    <path d="M80 102 Q170 94 270 100 T470 104 T660 100"/>
    <path d="M940 62 Q1020 56 1100 60 T1260 64"/>
    <path d="M1100 92 Q1170 86 1240 92"/>
    <path d="M1320 160 Q1380 156 1440 162"/>
  </g>

  <!-- Distant mountains (left + right far) -->
  <path d="M-20 310 L200 220 L360 280 L520 230 L680 290 L760 260 L900 310 Z" fill="#8a9db0" opacity="0.38"/>
  <path d="M900 310 L980 270 L1080 295 L1180 255 L1280 290 L1400 250 L1620 310 Z" fill="#8a9db0" opacity="0.42"/>

  <!-- Main Fuji, right-center -->
  <path d="M900 340 L1180 130 L1470 340 Z" fill="url(#fuji)"/>
  <!-- Fuji shading -->
  <path d="M1180 130 L1470 340 L1260 340 Z" fill="url(#fujiShadow)"/>
  <!-- Snow cap -->
  <path d="M1086 212 L1180 130 L1276 216 Q1256 198 1232 208 Q1212 218 1192 206 Q1170 198 1156 210 Q1138 224 1120 212 Q1104 204 1086 212 Z" fill="#faf8f5"/>
  <g fill="#faf8f5" opacity="0.85">
    <path d="M1100 244 Q1114 236 1126 250 Q1118 254 1104 254 Z"/>
    <path d="M1168 238 Q1184 228 1200 242 Q1188 248 1168 248 Z"/>
    <path d="M1220 266 Q1234 256 1248 270 Q1234 274 1220 272 Z"/>
  </g>

  <!-- Secondary smaller peak far left -->
  <g opacity="0.55">
    <path d="M120 320 L240 210 L360 320 Z" fill="#a47b62"/>
    <path d="M200 248 L240 210 L282 250 Q272 242 260 246 Q248 252 238 246 Q224 242 214 250 Q204 258 200 248 Z" fill="#faf8f5" opacity="0.7"/>
  </g>

  <!-- Horizon hint -->
  <line x1="0" y1="340" x2="1600" y2="340" stroke="#5a544d" stroke-width="0.8" opacity="0.2"/>

  <!-- Hokusai-inspired wave across the bottom -->
  <path d="M0 380 Q60 350 120 380 T240 380 Q300 350 360 380 T480 380 Q540 350 600 380 T720 380 Q780 350 840 380 T960 380 Q1020 350 1080 380 T1200 380 Q1260 350 1320 380 T1440 380 Q1500 350 1560 380 T1680 380 L1680 420 L0 420 Z" fill="url(#wave)"/>

  <!-- Wave crests -->
  <g stroke="#faf8f5" stroke-width="1.4" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M20 392 Q64 370 108 392"/>
    <path d="M220 392 Q264 370 308 392"/>
    <path d="M420 392 Q464 370 508 392"/>
    <path d="M620 392 Q664 370 708 392"/>
    <path d="M820 392 Q864 370 908 392"/>
    <path d="M1020 392 Q1064 370 1108 392"/>
    <path d="M1220 392 Q1264 370 1308 392"/>
    <path d="M1420 392 Q1464 370 1508 392"/>
  </g>
  <g stroke="#faf8f5" stroke-width="1" fill="none" opacity="0.28">
    <path d="M60 410 Q100 400 140 410"/>
    <path d="M260 410 Q300 400 340 410"/>
    <path d="M460 410 Q500 400 540 410"/>
    <path d="M660 410 Q700 400 740 410"/>
    <path d="M860 410 Q900 400 940 410"/>
    <path d="M1060 410 Q1100 400 1140 410"/>
    <path d="M1260 410 Q1300 400 1340 410"/>
    <path d="M1460 410 Q1500 400 1540 410"/>
  </g>

  <!-- Tiny cranes -->
  <g fill="#2d2926" opacity="0.55">
    <path d="M1140 78 Q1148 72 1156 78 Q1150 81 1148 84 Q1146 81 1140 78 Z"/>
    <path d="M1170 98 Q1178 92 1186 98 Q1180 101 1178 104 Q1176 101 1170 98 Z"/>
    <path d="M620 140 Q628 134 636 140 Q630 143 628 146 Q626 143 620 140 Z"/>
  </g>
</svg>
